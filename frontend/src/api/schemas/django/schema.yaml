  /migraine/episodes/:
    get:
      operationId: migraine_episodes_list
      parameters:
      - in: query
        name: disability_level
        schema:
          type: array
          items:
            type: string
            enum:
            - mild
            - moderate
            - none
            - severe
        description: |-
          * `none` - None — normal activity
          * `mild` - Mild — reduced efficiency
          * `moderate` - Moderate — significant impairment
          * `severe` - Severe — bed rest required
        explode: true
        style: form
      - in: query
        name: has_aura
        schema:
          type: boolean
      - in: query
        name: migraine_type
        schema:
          type: array
          items:
            type: string
            enum:
            - aura_only
            - aura_with_headache
            - chronic
            - cluster
            - hemiplegic
            - other
            - vestibular
            - without_aura
        description: |-
          * `aura_only` - Aura only (without headache)
          * `aura_with_headache` - Aura with headache
          * `without_aura` - Migraine without aura
          * `hemiplegic` - Hemiplegic
          * `vestibular` - Vestibular
          * `chronic` - Chronic
          * `cluster` - Cluster
          * `other` - Other
        explode: true
        style: form
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: pain_level_max
        schema:
          type: integer
      - in: query
        name: pain_level_min
        schema:
          type: integer
      - in: query
        name: started_after
        schema:
          type: string
          format: date-time
      - in: query
        name: started_before
        schema:
          type: string
          format: date-time
      tags:
      - Migraine - Episodes
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedMigraineEpisodeListList'
          description: ''
    post:
      operationId: migraine_episodes_create
      tags:
      - Migraine - Episodes
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MigraineEpisodeWriteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MigraineEpisodeWriteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MigraineEpisodeWriteRequest'
        required: true
      security:
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MigraineEpisodeWrite'
          description: ''
