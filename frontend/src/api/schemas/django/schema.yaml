components:
  schemas:
    BlankEnum:
      enum:
      - ''
    DisabilityLevelEnum:
      enum:
      - none
      - mild
      - moderate
      - severe
      type: string
      description: |-
        * `none` - None — normal activity
        * `mild` - Mild — reduced efficiency
        * `moderate` - Moderate — significant impairment
        * `severe` - Severe — bed rest required
    EffectivenessEnum:
      enum:
      - 0
      - 1
      - 2
      type: integer
      description: |-
        * `0` - No relief
        * `1` - Partial relief
        * `2` - Full relief
    HeadacheSideEnum:
      enum:
      - left
      - right
      - both
      type: string
      description: |-
        * `left` - Left
        * `right` - Right
        * `both` - Both
    LoginRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - password
      - username
    Medication:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        type:
          $ref: '#/components/schemas/TypeEnum'
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - name
    MedicationRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        type:
          $ref: '#/components/schemas/TypeEnum'
        is_active:
          type: boolean
      required:
      - name
    MigraineEpisodeDetail:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        started_at:
          type: string
          format: date-time
        ended_at:
          type: string
          format: date-time
          nullable: true
        duration_hours:
          type: number
          format: double
          readOnly: true
        migraine_type:
          $ref: '#/components/schemas/MigraineTypeEnum'
        pain_level:
          type: integer
          maximum: 32767
          minimum: 0
          description: 0=none, 1=little, 2=discomfort, 3=can't work, 4=debilitating,
            5=hospital
        headache_side:
          oneOf:
          - $ref: '#/components/schemas/HeadacheSideEnum'
          - $ref: '#/components/schemas/BlankEnum'
        headache_regions:
          type: array
          items:
            type: string
            maxLength: 20
        disability_level:
          oneOf:
          - $ref: '#/components/schemas/DisabilityLevelEnum'
          - $ref: '#/components/schemas/BlankEnum'
        has_aura:
          type: boolean
        aura_types:
          type: array
          items:
            type: string
            maxLength: 20
        visual_aura_locations:
          type: array
          items:
            type: string
            maxLength: 20
        aura_duration_minutes:
          type: integer
          maximum: 32767
          minimum: 0
          nullable: true
        sleep_hours_before:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,1})?$
          nullable: true
          description: Hours of sleep the night before onset
        stress_level:
          type: integer
          maximum: 32767
          minimum: 0
          nullable: true
          description: 0=none … 5=extreme
        menstrual_related:
          type: boolean
          nullable: true
        notes:
          type: string
        triggers:
          type: array
          items:
            $ref: '#/components/schemas/Trigger'
          readOnly: true
        symptoms:
          type: array
          items:
            $ref: '#/components/schemas/Symptom'
          readOnly: true
        episode_medications:
          type: array
          items:
            $ref: '#/components/schemas/MigraineEpisodeMedicationRead'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - duration_hours
      - episode_medications
      - id
      - started_at
      - symptoms
      - triggers
      - updated_at
    MigraineEpisodeHeatmap:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        date:
          type: string
          readOnly: true
        pain_level:
          type: integer
          readOnly: true
          description: 0=none, 1=little, 2=discomfort, 3=can't work, 4=debilitating,
            5=hospital
      required:
      - date
      - id
      - pain_level
    MigraineEpisodeList:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        started_at:
          type: string
          format: date-time
          readOnly: true
        ended_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        duration_hours:
          type: number
          format: double
          readOnly: true
        migraine_type:
          allOf:
          - $ref: '#/components/schemas/MigraineTypeEnum'
          readOnly: true
        pain_level:
          type: integer
          readOnly: true
